<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes" />
  <title>Confession Booth v4 — All Screens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0a0a0a;
      color: #fce8c8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 24px 18px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(252, 232, 200, 0.15);
    }
    h1 {
      font-family: 'Bagel Fat One', sans-serif;
      font-size: 28px;
      color: #fce8c8;
      letter-spacing: 0.01em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(252, 232, 200, 0.55);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 20px 14px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (min-width: 880px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1280px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    .card {
      background: #1a1a1a;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 0 3px #fce8c8;
      display: flex;
      flex-direction: column;
    }
    .label {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #0a0a0a;
      border-bottom: 1px solid rgba(252, 232, 200, 0.15);
    }
    .label-name {
      font-family: 'Bagel Fat One', sans-serif;
      font-size: 16px;
      color: #ff4d8e;
      letter-spacing: 0.02em;
    }
    .label-panel {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(252, 232, 200, 0.6);
      text-transform: uppercase;
    }
    .frame-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 390 / 844;
      background: #0a0a0a;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    footer {
      text-align: center;
      padding: 20px 18px 32px;
      color: rgba(252, 232, 200, 0.45);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .link {
      color: #ffd24a;
      text-decoration: none;
      letter-spacing: 0.06em;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header>
    <h1>Confession Booth v4</h1>
    <div class="sub">5 Screens · Wolność Panel Mapping</div>
  </header>

  <div class="grid">
    <div class="card">
      <div class="label">
        <span class="label-name">Booth</span>
        <span class="label-panel">Panel 1 · Wordmark Plate</span>
      </div>
      <div class="frame-wrap">
        <iframe src="/confession-booth-v4/?demo=booth" loading="lazy"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="label">
        <span class="label-name">Typing</span>
        <span class="label-panel">Panel 2 · Pill Stack</span>
      </div>
      <div class="frame-wrap">
        <iframe src="/confession-booth-v4/?demo=typing" loading="lazy"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="label">
        <span class="label-name">Processing</span>
        <span class="label-panel">Panel 3 · Sunburst</span>
      </div>
      <div class="frame-wrap">
        <iframe src="/confession-booth-v4/?demo=processing" loading="lazy"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="label">
        <span class="label-name">Absolution</span>
        <span class="label-panel">Panel 5 · Rainbow Arc</span>
      </div>
      <div class="frame-wrap">
        <iframe src="/confession-booth-v4/?demo=absolution" loading="lazy"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="label">
        <span class="label-name">Wall</span>
        <span class="label-panel">Panel 7 · Medallion Grid</span>
      </div>
      <div class="frame-wrap">
        <iframe src="/confession-booth-v4/?demo=wall" loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <footer>
    <a class="link" href="/confession-booth-v4/?demo=booth">→ Open full app</a>
  </footer>
</body>
</html>
